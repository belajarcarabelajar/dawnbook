[book]
authors = ["Iwan Kurniawan"]
language = "id"
src = "src"
title = "Geopolitik dalam Sejarah Piala Dunia"
description = "Analisis kritis hubungan antara geopolitik, pengaruh kekuasaan, dan diplomasi internasional dalam sejarah penyelenggaraan Piala Dunia."

[preprocessor.dawnbook]
optional = true
subject_label = "Hubungan Internasional (HI)"

[output.html.print]
enable = false

[output.html]
mathjax-support = true
additional-css = ["../shared-header.css", "../../apps/hub/src/styles/typography.css"]
additional-js = ["../shared-script.js"]
