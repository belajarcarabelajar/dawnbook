[book]
authors = ["Iwan Kurniawan"]
language = "id"
src = "src"
title = "Sistem Modul Rust"
description = "Panduan teknis memahami sistem modul, paket (crates), visibilitas, dan organisasi kode pada bahasa pemrograman Rust."

[preprocessor.dawnbook]
optional = true
subject_label = "Teknik Informatika"

[output.html.print]
enable = false

[output.html]
mathjax-support = true
additional-css = ["../shared-header.css", "../../apps/hub/src/styles/typography.css"]
additional-js = ["../shared-script.js"]
